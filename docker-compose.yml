services:
  frontend:
    build:
      context: ./frontend

    ports:
      - "5173:5173"

    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    depends_on:
      backend:
        condition: service_healthy


  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend/app:/app/app

    depends_on:
      # postgres:
      #   condition: service_healthy

      redis:
        condition: service_healthy

      elasticsearch:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
        ]

      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s


  # postgres:
  #   image: postgres:17-alpine

  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-app_user}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
  #     POSTGRES_DB: ${POSTGRES_DB:-knowledge_platform}

  #   ports:
  #     - "5432:5432"

  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-knowledge_platform}"
  #       ]

  #     interval: 5s
  #     timeout: 5s
  #     retries: 10


  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]

      interval: 5s
      timeout: 3s
      retries: 10


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.3

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1"
        ]

      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s


volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  elasticsearch_data: